# ============================================
# Flash偏移 - 适配 Nordic DFU bootloader
# 应用程序从 0x23000 开始，大小 0x80000 (512KB)
# 与 DTS 中 code_partition 的 reg 一致
# ============================================
CONFIG_FLASH_LOAD_OFFSET=0x23000
CONFIG_FLASH_LOAD_SIZE=0x80000

# ============================================
# USB 配置
# ============================================
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_HID_SUPPORT=y
CONFIG_SAMPLE_USBD_PID=0x0007

# CDC ACM 虚拟 COM 端口（用于串口日志输出）
# 不初始化为系统控制台，通过 cdc_acm_print() 手动输出日志
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_SERIAL=y
CONFIG_USBD_CDC_ACM_CLASS=y
# UDC 缓冲池：USB 控制传输最大可请求 4095 字节（setup->wLength），
# 默认 UDC_BUF_POOL_SIZE=1024 太小，导致 udc_ctrl_data_alloc() 失败
CONFIG_UDC_BUF_POOL_SIZE=16384

# ============================================
# 日志
# ============================================
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y
CONFIG_USBD_LOG_LEVEL_INF=y
CONFIG_USBD_HID_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y

# ============================================
# GPIO 和输入
# ============================================
CONFIG_GPIO=y
CONFIG_INPUT=y

# ============================================
# 蓝牙 BLE Central（主机）配置
# ============================================
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_SMP=y
# M720 Triathlon (BT 4.0) 不支持 Secure Connections，需要允许 legacy 配对
CONFIG_BT_SMP_SC_PAIR_ONLY=n
# 启用绑定，配对后保存密钥，下次不再需要重新配对
CONFIG_BT_BONDABLE=y
# 只连一个鼠标，不需要3个连接
CONFIG_BT_MAX_CONN=1
# Key 池大小：bt_keys_get_addr() 需要从 key_pool[] 中分配 slot
# 默认只有 1 个！如果之前的配对尝试占用了唯一的 slot 且地址不匹配，
# bt_keys_get_addr() 会返回 NULL → smp_send_pairing_req 返回 -ENOMEM
CONFIG_BT_MAX_PAIRED=3
# 允许在 key 池满时覆盖最旧的 key，防止永久阻塞
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y

# BLE 网络缓冲 - 增加缓冲数量防止 SMP 配对时的 ENOMEM
# ACL TX buffer: 用于发送 HCI 数据包（SMP 配对请求需要分配）
# 默认只有 3 个，被 GATT DM 等占用后就无法发送配对请求
CONFIG_BT_BUF_ACL_TX_COUNT=8
# L2CAP TX buffer: 用于 L2CAP 层发送数据（默认 = ACL_TX_COUNT）
CONFIG_BT_L2CAP_TX_BUF_COUNT=6
# ACL RX buffer extra: RX 总数 = BT_MAX_CONN + 1 + EXTRA
# 默认 EXTRA = BT_MAX_CONN = 1, 即总数 = 3, 增加到 6
CONFIG_BT_BUF_ACL_RX_COUNT_EXTRA=4
# HCI 命令 buffer: SMP 的 smp_init() 需要分配命令 buffer
# 默认只有 1 个！如果被其他操作占用，SMP 就返回 -ENOMEM
CONFIG_BT_BUF_CMD_TX_COUNT=3

# 蓝牙扫描
CONFIG_BT_SCAN=y
# Accept List（白名单）：实现硬件级自动重连，断连后自动扫描定向广播并发起连接
CONFIG_BT_FILTER_ACCEPT_LIST=y

# BLE 隐私/地址解析：M720 使用可解析随机地址（RPA），
# 每次切换到同一设备槽可能用不同随机地址重连。
# 启用隐私后，nRF 可解析不同 RPA 到同一身份地址，
# 从而找到之前配对的绑定密钥（LTK），避免 0x3e 错误。
CONFIG_BT_PRIVACY=y

# 工作队列栈 - BLE 的 GATT DM/HOGP 在工作队列中运行，需要更大栈
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

# 主堆栈 - USB + BLE 初始化都需要栈空间
CONFIG_MAIN_STACK_SIZE=16384

# 系统堆 - USB 控制端点需要 4095 字节的 net_buf 分配
# BLE GATT DM/HOGP 发现也需要大量堆内存分配
# nRF52840 有 256KB RAM，64KB 堆是安全的
CONFIG_HEAP_MEM_POOL_SIZE=65536

# ============================================
# Flash 存储 - 用于保存 bonding 配对信息和设备配置参数
# ============================================
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# ============================================
# GATT Discovery Manager
# ============================================
CONFIG_BT_GATT_DM=y

# ============================================
# HID over GATT Profile (HOGP) Client
# ============================================
CONFIG_BT_HOGP=y
CONFIG_BT_HOGP_REPORTS_MAX=8
